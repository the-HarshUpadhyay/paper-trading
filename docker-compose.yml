services:

  # ── Oracle XE 21c ────────────────────────────────────────────────────────────
  db:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: oracle          # sets SYS + SYSTEM password
      APP_USER: trader
      APP_USER_PASSWORD: trader
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./database/01_schema.sql:/container-entrypoint-initdb.d/01_schema.sql
      - ./database/02_triggers.sql:/container-entrypoint-initdb.d/02_triggers.sql
      - ./database/03_procedures.sql:/container-entrypoint-initdb.d/03_procedures.sql
      - ./database/04_sample_data.sql:/container-entrypoint-initdb.d/04_sample_data.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── Flask backend ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      ORACLE_USER: trader
      ORACLE_PASSWORD: trader
      ORACLE_DSN: db:1521/XEPDB1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app    # hot-reload: file changes reflect immediately

  # ── Vite dev server ───────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_TARGET: http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src          # hot-reload
      - ./frontend/public:/app/public

volumes:
  oracle_data:
